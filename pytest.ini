[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --html=report.html
    --self-contained-html
markers =
    basic: базовые проверки работоспособности стенда
    defect: автотест, фиксирующий известный дефект (ожидается падение)
    rub: сценарии рублёвого счёта
