name: F-Bank Selenium CI

# Сборка должна быть красной: тесты с маркером defect падают на текущей версии приложения.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  run-tests:
    name: Selenium on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnspr4 libnss3 libxss1 libasound2t64 libatk-bridge2.0-0 \
            libgbm1 libgtk-3-0 libxshmfence1 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libpango-1.0-0 \
            libpangocairo-1.0-0 fonts-liberation xdg-utils

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true
        id: chrome

      - name: Clear stale chromedriver
        run: |
          sudo rm -rf /opt/hostedtoolcache/setup-chrome/chromedriver || true
          sudo rm -f /usr/local/bin/chromedriver /usr/bin/chromedriver || true

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Serve dist/
        run: |
          cd dist
          nohup python3 -m http.server 8000 > /tmp/http.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8000/ >/dev/null && break
            sleep 0.5
          done
          curl -fs http://127.0.0.1:8000/

      - name: pytest
        env:
          APP_BASE_URL: http://127.0.0.1:8000
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: pytest --html=report.html --self-contained-html --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screens
          path: screenshots/*.png
          if-no-files-found: ignore
